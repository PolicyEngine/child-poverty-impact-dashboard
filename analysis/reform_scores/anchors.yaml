# Prior-score anchors for reform scenarios (validation reference).
#
# Keyed by scenario id (see score-scenarios.json). When an anchor exists, the
# scorer compares the API result to these bands (PASS if inside, PASS-WITH-NOTES
# if outside) — mirroring the `prior-scores-finder` + `reform-comparator` stages
# of `/analyze-policy`. Scenarios without an anchor fall back to direction-aware
# sanity rules only.
#
# Bands:
#   child_poverty_rel_reduction: [lo, hi]   fractional reduction (0.30 = -30%)
#   annual_cost:                 [lo, hi]   dollars/year (positive = costs money)

federal_ctc_expanded:
  source: "PolicyEngine / Columbia CPSP — 2021 ARPA CTC"
  # ARPA CTC cut child poverty ~30-40% at an annual cost of ~$100B.
  child_poverty_rel_reduction: [0.25, 0.45]
  annual_cost: [70000000000, 130000000000] # $70B–$130B/yr
