name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, type-check, coverage sweep)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      # Includes __tests__/reform-coverage.test.ts: every (state, option)
      # builds a valid reform dict without throwing.
      - run: npm run test

  reform-compute:
    name: Reform compute (every option runs through pinned PE-US)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      # Regenerate the coverage manifest so it can never go stale relative to
      # the registries/builders.
      - name: Generate reform manifest
        working-directory: frontend
        run: npm run manifest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Keep policyengine-us in sync with pyproject.toml,
      # backend/requirements.txt, and scripts/modal_cpid_endpoint.py.
      - name: Install policyengine-us (pinned to match Modal)
        run: pip install "policyengine-us==1.739.4" pytest
      - name: Validate every reform option computes
        run: pytest tests/calculations/test_reform_computes.py -q
